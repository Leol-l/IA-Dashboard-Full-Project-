services:
  # --- BACKEND (Express) ---
  api:
    build: ./API-GLPI
    container_name: glpi-api
    image: glpi-api:latest
    restart: always
    environment:
      - SCHEDULE_INTERVAL=${SCHEDULE_INTERVAL:-30}
    ports:
      - "3000:3000"
    env_file: ./API-GLPI/.env

  # --- FRONTEND (Next.js) ---
  dashboard:
    build: 
      context: ./Dashboard-Comment
      args:
        - API_BASE_URL=http://api:3000
    container_name: next-dashboard
    image: next-dashboard:latest
    restart: always
    environment:
      - API_BASE_URL=http://api:3000
      - SCHEDULE_INTERVAL=${SCHEDULE_INTERVAL:-30}
    ports:
      - "80:3001"
    depends_on:
      - api